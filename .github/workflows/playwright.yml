# .github/workflows/playwright.yml
# ─────────────────────────────────────────────────────────────────────────────
# Runs Inventure Happy Path Playwright tests on push / PR to main branch.
# Secrets required in GitHub → Settings → Secrets and variables → Actions:
#   BASE_URL, TEST_EMAIL, TEST_PASSWORD, GMAIL_USER, GMAIL_PASSWORD
# ─────────────────────────────────────────────────────────────────────────────

name: Inventure – Happy Path Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:            # allow manual run from GitHub UI

jobs:
  playwright-tests:
    name: Playwright Happy Path
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # ── 1. Checkout ─────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Node setup ───────────────────────────────────────────────────────
      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # ── 3. Install dependencies ─────────────────────────────────────────────
      - name: Install npm dependencies
        run: npm ci

      # ── 4. Install Playwright browsers ──────────────────────────────────────
      - name: Install Playwright browsers + deps
        run: npx playwright install --with-deps

      # ── 5. Create .env from GitHub Secrets ──────────────────────────────────
      - name: Create .env file
        run: |
          cat <<EOF > .env
          BASE_URL=${{ secrets.BASE_URL }}
          AUTH0_DOMAIN=${{ secrets.AUTH0_DOMAIN }}
          TEST_EMAIL=${{ secrets.TEST_EMAIL }}
          TEST_PASSWORD=${{ secrets.TEST_PASSWORD }}
          GMAIL_USER=${{ secrets.GMAIL_USER }}
          GMAIL_PASSWORD=${{ secrets.GMAIL_PASSWORD }}
          HEADLESS=true
          SLOW_MO=0
          SCREENSHOTS_DIR=screenshots
          VIDEOS_DIR=videos
          EOF
          
      # ── 6. Run tests ─────────────────────────────────────────────────────────
      - name: Run Happy Path tests
        run: npx playwright test --project=chromium
        env:
          CI: true

      # ── 7. Upload HTML report ────────────────────────────────────────────────
      - name: Upload Playwright HTML Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

      # ── 8. Upload screenshots ────────────────────────────────────────────────
      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots
          path: screenshots/
          retention-days: 14

      # ── 9. Upload videos ─────────────────────────────────────────────────────
      - name: Upload test videos
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: videos
          path: videos/
          retention-days: 14

      # ── 10. Upload traces (on failure) ───────────────────────────────────────
      - name: Upload Playwright traces
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces
          path: test-results/
          retention-days: 7
